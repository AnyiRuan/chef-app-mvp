<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智能厨艺导航 V1.0 - 完整版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div id="app">
        <div class="ambient-bg"></div>

        <!-- 1. Home Screen -->
        <div id="screen-home" class="screen">
            <div class="header">
                <h1>今天想吃什么？</h1>
                <p>为您精选50道经典入门菜谱</p>
            </div>
            <div class="recipe-grid" id="recipe-grid">
                <!-- Rendered via JS -->
            </div>
        </div>

        <!-- 2. Recipe Detail Screen -->
        <div id="screen-detail" class="screen">
            <div class="detail-header">
                <div class="back-btn" onclick="switchScreen('home')">←</div>
                <img id="detail-img" src="" alt="">
                <div class="detail-overlay"></div>
            </div>
            <div class="detail-title">
                <h1 id="detail-title">Recipe Name</h1>
                <div class="detail-tags">
                    <span id="detail-time">0分钟</span>
                    <span id="detail-diff">入门</span>
                </div>
            </div>

            <div class="section-title">准备食材</div>
            <div id="detail-ingredients">
                <!-- Rendered via JS -->
            </div>

            <div class="section-title" style="margin-top: 25px;">制作总览图</div>
            <div id="detail-timeline" class="timeline">
                <!-- Rendered via JS -->
            </div>

            <button class="btn btn-secondary" onclick="addIngredientsToCart()">+ 一键加入购物清单</button>
            <button class="btn btn-primary" onclick="startNavigation()" style="margin-top:20px; font-size:22px;">▶
                开始烹饪导航</button>
        </div>

        <!-- 3. Shopping Cart Screen -->
        <div id="screen-cart" class="screen">
            <div class="header" style="display:flex; justify-content:space-between; align-items:flex-end;">
                <div>
                    <h1>采购清单</h1>
                    <p>买好食材再去厨房哦</p>
                </div>
                <button onclick="clearCart()"
                    style="background:none;border:none;color:var(--primary);padding:10px;font-weight:600;">清空已购</button>
            </div>

            <div id="cart-list" style="margin-top: 20px;">
                <!-- Rendered via JS -->
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <div class="nav-item active" id="nav-home">
                <svg viewBox="0 0 24 24">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                </svg>
                <span>菜谱</span>
            </div>
            <div class="nav-item" id="nav-cart">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z" />
                </svg>
                <span>购物清单</span>
            </div>
        </div>

        <!-- Cooking Navigation Fullscreen Layer -->
        <div id="nav-screen">
            <div class="nav-top">
                <div style="color:var(--primary); font-weight:800; font-size:18px;">正在烹饪</div>
                <div class="nav-close" onclick="closeNavigation()">✕</div>
            </div>

            <div class="step-card">
                <div class="step-num" id="nav-step-num">Step 1 / X</div>
                <h2 class="step-action" id="nav-step-action">Action</h2>
                <p class="step-desc" id="nav-step-desc">Desc</p>

                <div class="timer-container" id="nav-timer-container">
                    <div class="timer-circle" id="nav-timer-circle">
                        <div class="timer-inner">
                            <div class="timer-time" id="nav-timer-text">00:00</div>
                            <div class="timer-label">剩余时间</div>
                        </div>
                    </div>
                </div>

                <div class="parallel-task" id="nav-parallel-task">
                    <span>同时可做 (并行任务)</span>
                    <p id="nav-parallel-desc">...</p>
                </div>
            </div>

            <div class="nav-bottom">
                <button class="nav-next-btn" id="nav-next-btn" onclick="nextNavStep()">完成，下一步</button>
            </div>
        </div>
    </div>

    <script src="recipes.js"></script>
    <script src="app.js"></script>
</body>

</html>
